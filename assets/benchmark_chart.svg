<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .title { font-size: 16px; font-weight: 700; fill: #1a1a2e; }
    .subtitle { font-size: 11px; fill: #666; }
    .label { font-size: 12px; fill: #333; font-weight: 600; }
    .value { font-size: 13px; fill: #fff; font-weight: 700; }
    .axis-label { font-size: 11px; fill: #999; }
    .grid { stroke: #e8e8e8; stroke-width: 1; }
  </style>

  <!-- Title -->
  <text x="300" y="28" text-anchor="middle" class="title">Win Rate on 513 OpenML Datasets</text>
  <text x="300" y="46" text-anchor="middle" class="subtitle">60-second budget · CPU only · 3-way comparison</text>

  <!-- Grid lines -->
  <line x1="100" y1="70" x2="100" y2="250" class="grid"/>
  <line x1="100" y1="250" x2="560" y2="250" class="grid"/>
  <line x1="215" y1="70" x2="215" y2="250" class="grid" stroke-dasharray="4,4"/>
  <line x1="330" y1="70" x2="330" y2="250" class="grid" stroke-dasharray="4,4"/>
  <line x1="445" y1="70" x2="445" y2="250" class="grid" stroke-dasharray="4,4"/>
  <line x1="560" y1="70" x2="560" y2="250" class="grid" stroke-dasharray="4,4"/>

  <!-- X-axis labels -->
  <text x="100" y="268" text-anchor="middle" class="axis-label">0%</text>
  <text x="215" y="268" text-anchor="middle" class="axis-label">20%</text>
  <text x="330" y="268" text-anchor="middle" class="axis-label">40%</text>
  <text x="445" y="268" text-anchor="middle" class="axis-label">60%</text>
  <text x="560" y="268" text-anchor="middle" class="axis-label">80%</text>

  <!-- Overall -->
  <text x="90" y="100" text-anchor="end" class="label">Overall</text>
  <!-- Orcetra 57.1% -->
  <rect x="100" y="80" width="262" height="16" rx="3" fill="#4F46E5"/>
  <text x="370" y="93" class="label" fill="#4F46E5">57.1%</text>
  <!-- AutoGluon 21.6% -->
  <rect x="100" y="100" width="99" height="16" rx="3" fill="#94A3B8"/>
  <text x="207" y="113" class="label" fill="#94A3B8">21.6%</text>
  <!-- FLAML 10.9% -->
  <rect x="100" y="120" width="50" height="16" rx="3" fill="#CBD5E1"/>
  <text x="158" y="133" class="label" fill="#999">10.9%</text>

  <!-- Classification -->
  <text x="90" y="170" text-anchor="end" class="label">Classif.</text>
  <rect x="100" y="150" width="268" height="16" rx="3" fill="#4F46E5"/>
  <text x="376" y="163" class="label" fill="#4F46E5">58.4%</text>
  <rect x="100" y="170" width="80" height="16" rx="3" fill="#94A3B8"/>
  <text x="188" y="183" class="label" fill="#94A3B8">17.5%</text>
  <rect x="100" y="190" width="52" height="16" rx="3" fill="#CBD5E1"/>
  <text x="160" y="203" class="label" fill="#999">11.3%</text>

  <!-- Regression -->
  <text x="90" y="240" text-anchor="end" class="label">Regr.</text>
  <rect x="100" y="220" width="245" height="16" rx="3" fill="#4F46E5"/>
  <text x="353" y="233" class="label" fill="#4F46E5">53.4%</text>
  <rect x="100" y="240" width="154" height="16" rx="3" fill="#94A3B8"/>
  <text x="262" y="253" class="label" fill="#94A3B8">33.6%</text>
  <rect x="100" y="260" width="45" height="16" rx="3" fill="#CBD5E1"/>
  <text x="153" y="273" class="label" fill="#999">9.9%</text>

  <!-- Legend -->
  <rect x="160" y="308" width="12" height="12" rx="2" fill="#4F46E5"/>
  <text x="178" y="319" class="label" fill="#4F46E5">Orcetra</text>
  <rect x="260" y="308" width="12" height="12" rx="2" fill="#94A3B8"/>
  <text x="278" y="319" class="label" fill="#94A3B8">AutoGluon</text>
  <rect x="370" y="308" width="12" height="12" rx="2" fill="#CBD5E1"/>
  <text x="388" y="319" class="label" fill="#999">FLAML</text>
</svg>
